server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  file:
    name: logs/tourguide-backend.log
  pattern:
    console: "ts=\"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}\" level=%level thread=%thread logger=%logger{36} msg=\"%replace(%msg){'\"','\\\\\"'}\"%n"
    file: "ts=\"%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX}\" level=%level thread=%thread logger=%logger{36} msg=\"%replace(%msg){'\"','\\\\\"'}\"%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 14
      total-size-cap: 1GB
      clean-history-on-start: true

# CORS Configuration
cors:
  allowed-origins: "*"
