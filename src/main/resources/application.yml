server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# CORS Configuration
cors:
  allowed-origins: "*"

# Local AI Configuration
local-ai:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model-name: ${OLLAMA_MODEL_NAME:qwen3:8b}
    temperature: ${OLLAMA_TEMPERATURE:0.4}
    think: ${OLLAMA_THINK:false}
    timeout: ${OLLAMA_TIMEOUT:PT120S}
