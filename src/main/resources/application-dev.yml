spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST:db-postgresql-fra1-24379-do-user-36243951-0.l.db.ondigitalocean.com}:${DB_PORT:25060}/${DB_NAME:defaultdb}?sslmode=require&sslrootcert=${DB_SSLROOTCERT:./ca-certificate.crt}
    username: ${DB_USER:doadmin}
    password: ${DO_DB_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.1.11:9000}
  public-url: ${MINIO_PUBLIC_URL:http://192.168.1.11:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  buckets:
    profile-photos: profile-photos
    place-images: place-images
    badge-icons: badge-icons
    quest-verifications: quest-verifications

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

# AI Service Configuration
ai-service:
  provider: ${AI_PROVIDER:ollama}
  base-url: ${AI_SERVICE_URL:http://159.65.127.73:8000}
  timeout: 30000

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
  model-name: ${GEMINI_MODEL_NAME:gemini-2.0-flash}
  temperature: ${GEMINI_TEMPERATURE:0.4}

# Pilot Zone Configuration (Izmir bounds)
pilot-zone:
  enabled: true
  min-latitude: 38.20
  max-latitude: 38.60
  min-longitude: 26.80
  max-longitude: 27.30
  center-latitude: 38.4192
  center-longitude: 27.1287

logging:
  level:
    com.tourguide: DEBUG
    org.hibernate.SQL: DEBUG
