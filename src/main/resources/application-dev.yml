spring:
  datasource:
    url: jdbc:postgresql://db-postgresql-fra1-24379-do-user-36243951-0.l.db.ondigitalocean.com:25060/defaultdb?sslmode=require&sslrootcert=./ca-certificate.crt
    username: doadmin
    password: ${DO_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# MinIO Configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  buckets:
    profile-photos: profile-photos
    place-images: place-images
    badge-icons: badge-icons
    quest-verifications: quest-verifications

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

# AI Service Configuration
ai-service:
  base-url: ${AI_SERVICE_URL:http://localhost:8000}
  timeout: 30000

# Pilot Zone Configuration (Izmir bounds)
pilot-zone:
  enabled: true
  min-latitude: 38.20
  max-latitude: 38.60
  min-longitude: 26.80
  max-longitude: 27.30
  center-latitude: 38.4192
  center-longitude: 27.1287

logging:
  level:
    com.tourguide: DEBUG
    org.hibernate.SQL: DEBUG
