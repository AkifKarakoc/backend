server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: tourguide-backend
    static_configs:
      - targets:
          - localhost
        labels:
          application: tourguide-backend
          environment: local
          __path__: /var/log/tourguide/*.log
    pipeline_stages:
      - logfmt:
          mapping:
            ts:
            level:
            thread:
            logger:
            msg:
      - labels:
          level:
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05.000Z07:00"
      - output:
          source: msg
